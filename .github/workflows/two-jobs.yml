name: two-jobs.yml
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: echo Running checks...
      - run: sleep 5
      - run: echo Checks passed!

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - run: echo Deploying...
      - run: echo Deploy complete!